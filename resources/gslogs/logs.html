<!doctype html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="{{ppath}}gslogs/logs.css" />
</head>
<body {{sys.scale}}>
  <div class="container">
    <div class="box">
      {{each data v}}
      <div class="card">
        <div class="ver-tag">{{v.version}}</div>
        <div class="t-line">时间：{{v.time}}</div>
        {{if splash}}
        <img class="tu" src="{{(splash.startsWith('http') || splash.startsWith('/')) ? splash : ppath + splash}}" />
        {{/if}}
        <div class="body">
          {{each v.rows row}}
          <div class="seg {{row.weapon ? 'w' : ''}}">
            <div class="seg-items">
              {{each row.items item}}
              <div class="icon {{item.rarity}} {{item.weapon ? 'weapon' : ''}} {{item.highlight ? 'hl' : ''}}">
                {{if item.icon}}
                <img src="{{item.icon}}" />
                {{else}}
                <span>{{item.name.slice(0, 2)}}</span>
                {{/if}}
              </div>
              {{/each}}
            </div>
          </div>
          {{/each}}
        </div>
      </div>
      {{/each}}
    </div>
    <div class="ft">from 小花火</div>
  </div>
</body>
</html>

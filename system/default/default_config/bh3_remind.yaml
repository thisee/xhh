# 崩坏3深渊/战场/乐土开期与结算提醒
# groups 填需要提醒的群号；也可以在群里发送 #小花火开启崩三提醒 自动加入
enable: false
groups: []
# 提醒艾特模式：none=不艾特，all=艾特全体，users=艾特指定QQ
at_mode: none
at_users: []
# 提醒附带图片，支持网络图片URL或本地图片路径，留空不发送图片
image: ''
# 默认按国服常见刷新时间提醒，可在锅巴或本文件里关闭/调整
items:
  - key: abyss_start
    name: 深渊开始
    cron: '0 15 * * 1,5'
    advance_minutes: 0
    msg: '深渊（超弦空间/量子流形）已经开启啦，记得打，也可以发送 #崩三当前深渊 快速查看当期 Boss，或发送 #崩三深渊攻略 查看作业。'
  - key: abyss_settle
    name: 深渊结算
    cron: '0 22 * * 3,7'
    advance_minutes: 30
    msg: '崩三深渊速报：深渊将在 {time} 结算，提前 {advance} 分钟提醒：没打完记得检查一下。'
  - key: battlefield_start
    name: 记忆战场开始
    cron: '0 4 * * 2'
    advance_minutes: 0
    msg: '记忆战场新一期开始啦，可以发送 #崩三战场攻略 查看阵容。'
  - key: battlefield_settle
    name: 记忆战场结算
    cron: '0 4 * * 1'
    advance_minutes: 30
    msg: '记忆战场将在 {time} 结算，提前 {advance} 分钟提醒：记得检查分数和奖励。'
  - key: godwar_start
    name: 往世乐土开始
    cron: '0 4 * * 1'
    advance_minutes: 0
    msg: '往世乐土新一周开始啦，可以发送 #崩三乐土攻略 查看攻略。'
  - key: godwar_settle
    name: 往世乐土结算
    cron: '0 4 * * 1'
    advance_minutes: 30
    msg: '往世乐土将在 {time} 结算，提前 {advance} 分钟提醒：记得领取本周奖励。'

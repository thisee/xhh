#修改的时候，注意英文冒号后面要有一个空格！！！

#凌晨3:30是否自动更新xhh：true开，false关 (注意：这是强制更新,会覆盖文件的那种,爱改文件的大佬慎用)
update: false

#图片渲染精度：填数字（单位：%）
img_quality: 80

#塔罗牌开关：true开，false关
tlp: false

#塔罗牌每天上限次数：填数字（单位：次）
tlpcs: 3

#星铁攻略开关：true开，false关
sr_strategy: false

#查委托是否必须带#号前缀：true开，false关
wt: false

#是否设置小花火体力为默认体力：true是，false否
Tl: false

#原神和星铁的语音功能: true开，false关
all_voice: true

#原神历史卡池功能: true开，false关
gs_logs: true

#星铁历史卡池功能: true开，false关
sr_logs: true

#星铁货币战争战绩显示数量：填数字 (取1-3，避免图太长)
huobi_num: 2

#小花火图鉴是否启用？：true是，false否 (优先级设置在other.yaml文件)
wiki: false

#米游社扫码绑定功能：true开，false关
sm: false

#米游社扫码绑定的触发CD：填数字 (单位：秒)
sm_cd: 60

#签到功能：true开，false关 (自动签到设置在sign.yaml文件)
sign: false

#使用xhh绑定设备(作用于genshin、StarRail-plugin、ZZZ-Plugin)：true开，false关 (开启后，还需要给bot发送：xhh开启设备     bot会自动更新文件然后重启！)
bdsb: false

#米哈游视频播报(米游社)：QQ群号 (更多设置在other.yaml文件)
#groups:
#    - 123456789
#    - 987654321
#
groups: 

#是否启用bilibili相关功能：true开，false关 (注意：如果是首次启用，记得发送：b站登录，你得让bot有个B站账号吧)
bilibili: false

#bilibili视频的主评论区，显示几条评论((1-20)不建议设置过多)
list_num: 12

#bilibili下载视频的清晰度：填数字 （0：360p，1：480p，2：720P，3：1080p，继续往上需要bili大会员，4：1080P+ 高码率，5：4K 超清）
#注意: 很多90MB以下的视频是没有4k超清的，如果你选择了4k超清，但是视频没有的话，会自动降级到1080p+高码率下载
#请量力而行，自己服务器网速不行，就不要开高了
qn: 3

#bilibili视频小于多少MB时自动下载：填数字（最大填99，0代表永远不自动下载）
#注意：视频大小会随你的清晰度设置而变化
dow_size: 30

#bilibili收藏视频的收藏夹序号(1就是默认收藏夹)
mlid_n: 1

#解析bilibili视频分享卡片时弹出原B站链接：true是，false否
b_lj: true

#解析bili同一视频id或同一动态id时是否加入3分钟CD：true是，false否
b_cd: false

#bilibili自动下载图片时，小于几张图片时，不再合并消息：填数字 (0表示始终合并)
b_img_num: 0

#bilibili的Cookie(别手动加,首次获取请发送：b站登录)
bili_ck: ''

#bilibili刷新ck需要用到的刷新口令(不要乱改，这是b站登录获取的)
refresh_token: ''

#（bilibili解析图片）浏览器不支持emoji时，用cdn渲染emoji的表情：true开，false关
emoji: false

#解决扫码绑定和刷新ck最后的合并消息报错（解决某些适配器插件的合并消息内嵌合并消息会报错的bug)
#如果你bot有这种问题，就改成：true
hbxx: false

#http://ttocr.com/
Verification_API_KEY: ''
# 米游社签到手动验证码服务
manual_gt_enable: true
manual_gt_host: 0.0.0.0
manual_gt_port: 3000
manual_gt_public_url: ''
manual_gt_path: /xhh-gt
manual_gt_timeout: 120

#卡池立绘来源：custom 使用本地/插件额外图，official 使用官方资源优先
gacha_art_source: custom

